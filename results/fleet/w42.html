<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BreachBench · live replay</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f9fafb; --panel2:#f3f4f6; --line:#e5e7eb; --line2:#d1d5db;
    --txt:#374151; --txt2:#4b5563; --dim:#6b7280; --faint:#9ca3af; --ink:#111827;
    --brand:#e07b39; --rust:#b8451a; --brand-dark:#7a2e0e;
    --blue:#2563eb; --green:#16a34a; --teal:#0d9488; --pink:#db2777; --red:#dc2626;
    --orange-tint:#fff7ed; --red-tint:#fef2f2; --pink-tint:#fdf2f8; --green-tint:#f0fdf4; --blue-tint:#eff6ff;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased;}
  header.top{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);
    background:var(--bg);position:sticky;top:0;z-index:10;}
  .logo{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--brand),var(--rust));}
  header.top h1{font-size:15px;margin:0;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
  .tag{font-family:var(--mono);font-size:9px;letter-spacing:.6px;color:var(--rust);border:1px solid #f0c9b0;
    padding:2px 6px;border-radius:5px;background:var(--orange-tint);}
  .meta-badges{display:flex;gap:7px;flex-wrap:wrap;margin-left:6px;}
  .badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;background:var(--panel2);
    border:1px solid var(--line);color:var(--dim);white-space:nowrap;}
  .badge.good{color:var(--blue);border-color:#bfdbfe;background:var(--blue-tint);}
  .badge.bad{color:var(--rust);border-color:#f0c9b0;background:var(--orange-tint);}
  .spacer{flex:1;}
  .pill{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:4px 12px;border-radius:6px;border:1px solid transparent;}
  main{max-width:920px;margin:0 auto;padding:20px 22px 90px;}
  .step{border-left:2px solid var(--line);margin:0 0 5px;background:var(--bg);}
  .step-head{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;border-radius:0 8px 8px 0;}
  .step-head:hover{background:var(--panel);}
  .step.operator{border-left-color:#bfdbfe;}
  .step.operator .who{color:var(--blue);}
  .step.adversary{border-left-color:#f0c9b0;}
  .step.adversary .who{color:var(--rust);}
  .step.flag-inject{border-left-color:var(--rust);}
  .step.flag-breach-money,.step.flag-breach-leak{border-left-color:var(--red);background:var(--red-tint);}
  .step.flag-meltdown{border-left-color:var(--pink);background:var(--pink-tint);}
  .step.flag-defend{border-left-color:var(--green);background:var(--green-tint);}
  .step-n{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:54px;}
  .who{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .step-summary{flex:1;font-size:12.5px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .step-side{font-family:var(--mono);font-size:10px;color:var(--faint);display:flex;gap:10px;align-items:center;}
  .flag-chip{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;}
  .step-body{padding:2px 13px 14px 13px;display:none;}
  .step.open .step-body{display:block;}
  .block{margin:8px 0;border-radius:9px;overflow:hidden;border:1px solid var(--line);}
  .block .bh{font-family:var(--mono);font-size:10px;letter-spacing:.3px;padding:6px 11px;background:var(--panel2);color:var(--dim);font-weight:600;}
  .block .bc{padding:10px 12px;font-size:12.5px;line-height:1.55;white-space:pre-wrap;background:var(--bg);color:var(--txt);}
  .block.think .bc{color:var(--txt2);font-style:italic;font-family:var(--mono);font-size:11.5px;background:var(--panel);}
  .block.think .bh{color:var(--brand-dark);}
  .block.tool .bh{color:var(--teal);}
  .block.tool .bc{font-family:var(--mono);font-size:11.5px;color:#0f3f3a;background:#f0fdfa;}
  .block.out .bh{color:var(--green);}
  .block.out .bc{font-family:var(--mono);font-size:11px;color:#14532d;background:var(--green-tint);max-height:280px;overflow:auto;}
  .block.email .bh{color:var(--rust);}
  .block.email .bc{background:var(--orange-tint);color:var(--brand-dark);}
  .controls{position:sticky;top:55px;z-index:9;background:var(--bg);display:flex;gap:8px;padding:11px 0;border-bottom:1px solid var(--line);margin-bottom:12px;align-items:center;}
  button.btn{font-family:var(--mono);font-size:11px;color:var(--txt);background:var(--bg);border:1px solid var(--line2);padding:6px 12px;border-radius:7px;cursor:pointer;}
  button.btn:hover{background:var(--panel);}
  .summary{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 14px;}
  .kpi{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 15px;min-width:96px;}
  .kpi .l{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;font-family:var(--mono);}
  .kpi .v{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--ink);}
  *::-webkit-scrollbar{width:9px;height:9px;}
  *::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:6px;}
  *::-webkit-scrollbar-track{background:transparent;}
</style></head>

const OC = {breached:"#dc2626", meltdown:"#db2777", survived:"#16a34a"};
const OC_BG = {breached:"#fef2f2", meltdown:"#fdf2f8", survived:"#f0fdf4"};
const OC_BORDER = {breached:"#fecaca", meltdown:"#fbcfe8", survived:"#bbf7d0"};
const FLAG = {
  "inject":{c:"#b8451a",t:"injection"}, "breach-money":{c:"#dc2626",t:"BREACH $"},
  "breach-leak":{c:"#e07b39",t:"BREACH leak"}, "meltdown":{c:"#db2777",t:"meltdown"},
  "defend":{c:"#16a34a",t:"defended"}};

function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function summarize(turn){
  if(turn.actor==="adversary") return "injected email: " + esc(turn.tool? turn.tool.args.subject : "(no send)");
  if(turn.tool){
    const a=turn.tool.args, n=turn.tool.name;
    const argstr = Object.keys(a).length? " "+Object.entries(a).map(([k,v])=>`${k}=${JSON.stringify(v)}`).join(" ").slice(0,90):"";
    return esc(n+argstr);
  }
  return esc((turn.assistant||"(thinking, no action)").slice(0,110));
}
function block(cls, head, content){
  if(content==null || content==="") return "";
  return `<div class="block ${cls}"><div class="bh">${head}</div><div class="bc">${esc(content)}</div></div>`;
}
function render(){
  const m=DATA.meta;
  document.getElementById("meta").innerHTML =
    `<span class="badge">${m.scenario} · ${m.location}</span>`+
    `<span class="badge good">good: ${m.good_model}</span>`+
    `<span class="badge bad">adversary: ${m.bad_model}</span>`+
    `<span class="badge">${m.attack_class}</span>`;
  const oc=document.getElementById("outcome"); oc.textContent=m.outcome;
  oc.style.color=OC[m.outcome]||"#6b7280"; oc.style.background=OC_BG[m.outcome]||"#f3f4f6";
  oc.style.borderColor=OC_BORDER[m.outcome]||"#e5e7eb";
  document.getElementById("summary").innerHTML =
    `<div class="kpi"><div class="l">balance</div><div class="v">$${m.start_balance.toFixed(0)} → $${m.end_balance.toFixed(0)}</div></div>`+
    `<div class="kpi"><div class="l">sim days</div><div class="v">${m.days}</div></div>`+
    `<div class="kpi"><div class="l">steps</div><div class="v">${m.steps}</div></div>`+
    (m.ttb!=null?`<div class="kpi"><div class="l">time-to-breach</div><div class="v" style="color:#dc2626">${m.ttb.toFixed(1)}d</div></div>`:"");
  document.getElementById("count").textContent = DATA.turns.length + " turns";

  const host=document.getElementById("steps");
  DATA.turns.forEach((turn)=>{
    const flag = turn.flag? FLAG[turn.flag] : null;
    const el=document.createElement("div");
    el.className = `step ${turn.actor}` + (turn.flag?` flag-${turn.flag}`:"") + " open";
    let emailBlock="";
    if(turn.actor==="adversary" && turn.tool){
      emailBlock = `<div class="block email"><div class="bh">✉️ Injected email</div><div class="bc">`+
        `<b>Subject:</b> ${esc(turn.tool.args.subject)}\n\n${esc(turn.tool.args.body)}</div></div>`;
    }
    el.innerHTML = `
      <div class="step-head">
        <span class="step-n">Step ${turn.n}</span>
        <span class="who">${turn.actor==="operator"?"● operator":"● adversary"}</span>
        <span class="step-summary">${summarize(turn)}</span>
        <span class="step-side">
          ${flag?`<span class="flag-chip" style="color:${flag.c};background:${flag.c}1a">${flag.t}</span>`:""}
          <span>d${turn.sim_day} · $${turn.balance.toFixed(0)}</span>
        </span>
      </div>
      <div class="step-body">
        ${block("think","🤔 Thinking", turn.thinking)}
        ${block("assist","💬 Assistant", turn.assistant)}
        ${emailBlock}
        ${turn.tool && turn.actor==="operator"? `<div class="block tool"><div class="bh">⚡ Tool Call: ${esc(turn.tool.name)}</div><div class="bc">${esc(JSON.stringify(turn.tool.args,null,2))}</div></div>`:""}
        ${turn.actor==="operator"? block("out","📤 Output", turn.output):""}
      </div>`;
    el.querySelector(".step-head").addEventListener("click",()=>el.classList.toggle("open"));
    host.appendChild(el);
  });
}
render();
document.getElementById("expand").onclick=()=>document.querySelectorAll(".step").forEach(s=>s.classList.add("open"));
document.getElementById("collapse").onclick=()=>document.querySelectorAll(".step").forEach(s=>s.classList.remove("open"));
</script>
